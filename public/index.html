        <div class="ns-bio">
          <p>Born in New Jersey and raised in Florida, I'm a creative professional with a passion for graphic design, visual storytelling, and documenting meaningful moments.</p>
          <p>I earned an Associate degree in Digital Film &amp; Television Production from Seminole State College and a Bachelor's degree in Digital Media from the University of Central Florida, with a specialization in Web Development. At UCF, I served as Marketing Director for VolunteerUCF, leading creative initiatives and managing the social media accounts for one of the university's largest student organizations.</p>
          <p>I'm driven by challenging work, an adventurous mindset, and creating things that leave a lasting impression.</p>
